services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    image: frontend-image
    container_name: frontend-container
    ports:
      - 8888:8888
    restart: unless-stopped

    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    image: backend-image
    container_name: backend-container
    ports:
      - 3333:3333

    volumes:
      - ./backend:/app
      - /app/node_modules

    env_file:
      - ./backend/.env

    restart: unless-stopped
